<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CF DNS Manager</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-700 font-sans">
    <div id="app" class="flex h-screen overflow-hidden">
        <div class="w-64 bg-white border-r flex flex-col p-4">
            <h1 class="font-black text-xl mb-6 px-2 text-indigo-600">Cloudflare DNS</h1>
            <div class="flex-1 overflow-y-auto space-y-1">
                {% raw %}
                <div v-for="z in zones" @click="activeZone=z" 
                     :class="activeZone?.zoneId==z.zoneId ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-500'" 
                     class="p-3 rounded-xl cursor-pointer hover:bg-gray-100 truncate text-sm transition-all">
                    [[ z.name ]]
                </div>
                {% endraw %}
            </div>
            <button @click="showAddZone=true" class="mt-4 border-2 border-dashed border-slate-200 p-3 rounded-xl text-sm text-gray-400 hover:text-indigo-500 hover:border-indigo-300">+ 绑定新域名</button>
            <div class="mt-4 pt-4 border-t flex justify-between items-center px-2">
                <span class="text-xs text-slate-400">用户: {{ user }}</span>
                <a href="/logout" class="text-xs text-red-400 hover:underline">退出</a>
            </div>
        </div>

        <div class="flex-1 p-8 overflow-y-auto">
            {% raw %}
            <div v-if="activeZone">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-2xl font-black text-slate-800">[[ activeZone.name ]]</h2>
                        <p class="text-xs text-slate-400 font-mono">[[ activeZone.zoneId ]]</p>
                    </div>
                    <div class="flex gap-2">
                        <button @click="getRecs" class="bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-300">刷新</button>
                        <button @click="openModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700">+ 新增解析</button>
                        <button @click="delZone" class="text-red-400 text-xs hover:underline ml-4">解绑域名</button>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest">
                            <tr><th class="p-4 font-semibold">类型</th><th class="p-4 font-semibold">名称</th><th class="p-4 font-semibold text-center">CDN状态</th><th class="p-4 font-semibold text-right">操作</th></tr>
                        </thead>
                        <tbody class="text-sm divide-y divide-slate-50">
                            <tr v-for="r in records" :key="r.id" class="hover:bg-indigo-50/30 transition-colors">
                                <td class="p-4"><span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-[10px] font-bold">[[ r.type ]]</span></td>
                                <td class="p-4 font-mono font-medium">[[ r.name ]]</td>
                                <td class="p-4 text-center">
                                    <svg v-if="r.proxied" class="w-6 h-6 mx-auto text-orange-500 drop-shadow-sm" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M5.5 16a3.5 3.5 0 01-.369-6.98 4 4 0 117.759-1.549V8a3.5 3.5 0 111.47 6.682C14.06 14.93 13.54 15 13 15H5.5z"/>
                                    </svg>
                                    <svg v-else class="w-6 h-6 mx-auto text-slate-200" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M5.5 16a3.5 3.5 0 01-.369-6.98 4 4 0 117.759-1.549V8a3.5 3.5 0 111.47 6.682C14.06 14.93 13.54 15 13 15H5.5z"/>
                                    </svg>
                                </td>
                                <td class="p-4 text-right space-x-4">
                                    <button @click="openModal(r)" class="text-indigo-500 hover:font-bold">编辑</button>
                                    <button @click="delRec(r.id)" class="text-red-400 hover:font-bold">删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div v-else class="h-full flex flex-col items-center justify-center text-slate-300">
                <p>请在左侧选择一个域名开始管理</p>
            </div>

            <div v-if="showEdit" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                    <h3 class="text-xl font-bold mb-6 text-slate-800">[[ editData.id ? '编辑' : '新增' ]]解析记录</h3>
                    <div class="space-y-5">
                        <div class="grid grid-cols-3 gap-4">
                            <select v-model="editData.type" class="border-slate-200 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                                <option v-for="t in ['A','CNAME','TXT','AAAA','MX','NS']">[[ t ]]</option>
                            </select>
                            <input v-model="editData.name" placeholder="名称 (如 @ 或 www)" class="col-span-2 border-slate-200 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <input v-model="editData.content" placeholder="记录内容 (IP 目标地址)" class="w-full border-slate-200 border rounded-xl p-3 outline-none focus:ring-2 focus:ring-indigo-500">
                        
                        <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-xl cursor-pointer hover:bg-slate-100 transition-colors" @click="editData.proxied = !editData.proxied">
                            <div class="w-5 h-5 rounded border flex items-center justify-center" :class="editData.proxied ? 'bg-orange-500 border-orange-500' : 'bg-white border-slate-300'">
                                <svg v-if="editData.proxied" class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <label class="text-sm font-semibold text-slate-600 cursor-pointer select-none">开启 Cloudflare 代理 (小黄云)</label>
                        </div>
                    </div>
                    <div class="mt-8 flex gap-3">
                        <button @click="saveRec" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200">保存设置</button>
                        <button @click="showEdit=false" class="flex-1 bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold hover:bg-slate-200">取消</button>
                    </div>
                </div>
            </div>

            <div v-if="showAddZone" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
                    <h3 class="text-xl font-bold mb-6 text-slate-800">绑定新域名</h3>
                    <div class="space-y-4">
                        <input v-model="nz.name" placeholder="显示名称 (例如: 主站)" class="w-full border-slate-200 border rounded-xl p-4 outline-none focus:ring-2 focus:ring-indigo-500">
                        <input v-model="nz.zoneId" placeholder="Cloudflare 区域 ID" class="w-full border-slate-200 border rounded-xl p-4 outline-none focus:ring-2 focus:ring-indigo-500">
                        <input v-model="nz.token" type="password" placeholder="API Token (需 DNS 编辑权限)" class="w-full border-slate-200 border rounded-xl p-4 outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <button @click="addZone" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black shadow-xl shadow-slate-200">保存并连接</button>
                    <button @click="showAddZone=false" class="w-full mt-2 text-slate-400 text-xs py-2 text-center hover:text-slate-600">返回</button>
                </div>
            </div>
            {% endraw %}
        </div>
    </div>

    <script>
        const { createApp } = Vue
        createApp({
            {% raw %} delimiters: ['[[', ']]'], {% endraw %}
            data() {
                return {
                    zones: [], activeZone: null, records: [],
                    showEdit: false, showAddZone: false,
                    editData: {}, nz: {}
                }
            },
            mounted() { this.getZones() },
            watch: { activeZone() { if (this.activeZone) this.getRecs() } },
            methods: {
                async getZones() {
                    const res = await fetch('/api/zones'); this.zones = await res.json();
                },
                async addZone() {
                    if(!this.nz.zoneId || !this.nz.token) return alert('信息不完整');
                    await fetch('/api/zones', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(this.nz) });
                    this.showAddZone = false; this.nz = {}; this.getZones();
                },
                async delZone() {
                    if (confirm('确定解绑？')) {
                        await fetch(`/api/zones/${this.activeZone.zoneId}`, { method: 'DELETE' });
                        this.activeZone = null; this.getZones();
                    }
                },
                async getRecs() {
                    const res = await fetch(`/api/cf/${this.activeZone.zoneId}/`);
                    this.records = (await res.json()).result || [];
                },
                openModal(r = null) {
                    this.editData = r ? { ...r } : { type: 'A', name: '', content: '', proxied: false };
                    this.showEdit = true;
                },
                async saveRec() {
                    const id = this.editData.id;
                    const res = await fetch(`/api/cf/${this.activeZone.zoneId}/` + (id ? id : ''), {
                        method: id ? 'PUT' : 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.editData)
                    });
                    if ((await res.json()).success) { this.showEdit = false; this.getRecs(); } 
                    else { alert('保存失败，请检查填写内容或Token权限'); }
                },
                async delRec(id) {
                    if (confirm('确认删除此解析记录？')) {
                        await fetch(`/api/cf/${this.activeZone.zoneId}/${id}`, { method: 'DELETE' });
                        this.getRecs();
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
