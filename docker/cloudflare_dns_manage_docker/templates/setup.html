<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>设置</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-900 flex items-center justify-center h-screen font-sans">
    <form action="/setup" method="post" class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
        <h2 class="text-2xl font-black mb-2 text-slate-800">首次初始化</h2>
        <p class="text-slate-400 text-xs mb-8">设置您的管理员账号，账号存储在本地 DB</p>
        <input name="username" placeholder="管理员用户名" class="w-full bg-slate-50 p-4 mb-3 rounded-2xl outline-none" required>
        <input name="password" type="password" placeholder="管理员密码" class="w-full bg-slate-50 p-4 mb-6 rounded-2xl outline-none" required>
        <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">创建并登录</button>
    </form>
</body>
</html>
